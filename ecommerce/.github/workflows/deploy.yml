name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.0

      with:
        host: 3.237.9.42
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}

        script: |
          cd ~/ecommerce-django
          git pull origin main
          source venv/bin/activate
          pip install -r requirements.txt
          sudo systemctl restart gunicorn