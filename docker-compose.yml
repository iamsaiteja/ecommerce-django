services:

  db:
    image: postgres:16

    environment:
      POSTGRES_DB: solemate_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Sai@123pg

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7-alpine
    container_name: redis

    ports:
      - "6379:6379"


  backend:
    build: .

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    depends_on:
      - db
      - redis

    env_file:
      - .env


  frontend:
    build: ./frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend


volumes:
  postgres_data: