{% extends 'base.html' %}
{% block title %}Seller Setup - SoleMate{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-lg">
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">🏪</div>
            <h2 class="text-2xl font-bold">Setup Your Shop</h2>
            <p class="text-gray-500">Start selling on ShopIndia</p>
        </div>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700">
                Create Shop
            </button>
        </form>
    </div>
</div>
{% endblock %}
