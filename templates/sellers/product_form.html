{% extends 'base.html' %}
{% block title %}{{ title }} - SoleMate{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl shadow p-8">
        <h1 class="text-2xl font-bold mb-6">{{ title }}</h1>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors|first }}</p>{% endif %}
            </div>
            {% endfor %}
            <div class="flex gap-4">
                <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700">Save Product</button>
                <a href="/sellers/dashboard/" class="flex-1 text-center border border-gray-300 py-3 rounded-xl hover:bg-gray-50">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
