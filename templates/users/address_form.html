{% extends 'base.html' %}
{% block title %}Add Address - SoleMate{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl shadow p-8">
        <h1 class="text-xl font-bold mb-6">📍 Add Delivery Address</h1>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
            <div class="flex gap-4">
                <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700">Save Address</button>
                <a href="/users/profile/" class="flex-1 text-center border border-gray-300 py-3 rounded-xl hover:bg-gray-50">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
