{% extends 'base.html' %}
{% block title %}Payment - SoleMate{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12">
    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-md w-full text-center">
        <div class="text-6xl mb-4">💳</div>
        <h2 class="text-2xl font-bold mb-2">Complete Payment</h2>
        <p class="text-gray-500 mb-6">Order #{{ order.order_number }}</p>

        <div class="bg-blue-50 rounded-xl p-4 mb-6">
            <p class="text-3xl font-bold text-blue-600">₹{{ order.total }}</p>
            <p class="text-gray-500 text-sm">Total Amount</p>
        </div>

        <button id="pay-btn"
                class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition text-lg">
            🔒 Pay Now
        </button>
        <p class="text-xs text-gray-500 mt-3">Powered by Razorpay • 100% Secure</p>
    </div>
</div>

<form id="payment-form" method="POST" action="/orders/payment/callback/">
    {% csrf_token %}
    <input type="hidden" id="razorpay_payment_id" name="razorpay_payment_id">
    <input type="hidden" id="razorpay_order_id" name="razorpay_order_id">
    <input type="hidden" id="razorpay_signature" name="razorpay_signature">
</form>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    document.getElementById('pay-btn').onclick = function(e) {
        var options = {
            key: "{{ razorpay_key }}",
            amount: "{{ amount }}",
            currency: "{{ currency }}",
            name: "ShopIndia",
            description: "Order #{{ order.order_number }}",
            order_id: "{{ order.razorpay_order_id }}",
            handler: function(response) {
                document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
                document.getElementById('razorpay_order_id').value = response.razorpay_order_id;
                document.getElementById('razorpay_signature').value = response.razorpay_signature;
                document.getElementById('payment-form').submit();
            },
            prefill: {
                email: "{{ request.user.email }}",
                contact: "{{ request.user.phone }}"
            },
            theme: { color: "#2563eb" }
        };
        var rzp = new Razorpay(options);
        rzp.open();
        e.preventDefault();
    };
</script>
{% endblock %}
